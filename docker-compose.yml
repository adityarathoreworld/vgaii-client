# Docker Compose for the VGAII CRM (Next.js).
#
# Uses an EXTERNAL MySQL/MariaDB database — no DB container here. Provide the
# connection string and secrets via the stack's Environment variables in
# Portainer (NOT committed to this public repo).
#
# Required env:
#   DATABASE_URL   e.g. mysql://user:pass@host:3306/dbname
#   JWT_SECRET     long random string
#
# On the very first deploy against a fresh database, also set SEED_ON_START=true
# once to create the demo data + test users (the entrypoint runs migrations
# regardless).

services:
  web:
    build:
      context: .
      args:
        # Build-time only (inlined into the client bundle by Next).
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    ports:
      # host:container — app listens on 3000 inside; published on 4000 on the
      # host. Override WEB_PORT in Portainer's env to change the host port.
      - "${WEB_PORT:-4000}:3000"
    environment:
      # ─── Core (required — set in Portainer stack env) ───────────────────
      # Full connection string to your external DB.
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the stack environment}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the stack environment}
      # Set to "true" once to seed a fresh DB on startup (see entrypoint).
      SEED_ON_START: ${SEED_ON_START:-false}

      # ─── Optional integrations (leave blank if unused) ──────────────────
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN:-}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD:-}
      SUBSCRIPTION_CHECK_URL: ${SUBSCRIPTION_CHECK_URL:-}
      SUBSCRIPTION_X_CRM_KEY: ${SUBSCRIPTION_X_CRM_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_MAX_UPLOAD_BYTES: ${R2_MAX_UPLOAD_BYTES:-}
      CRON_SECRET: ${CRON_SECRET:-}
